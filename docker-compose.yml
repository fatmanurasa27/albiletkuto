services:
  # --- ALTYAPI SERVİSLERİ ---
  postgres:
    image: postgres:15-alpine
    container_name: albiletkuto_postgres
    environment:
      POSTGRES_USER: kuto_user
      POSTGRES_PASSWORD: kuto_password
      POSTGRES_DB: albiletkuto_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: albiletkuto_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: albiletkuto_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: albiletkuto_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: unless-stopped

  # --- BİZİM YAZDIĞIMIZ MİKROSERVİSLER ---
  auth-service:
    build: ./services/auth-service
    container_name: albiletkuto_auth
    ports:
      - "8000:80"
    depends_on:
      - postgres
    restart: unless-stopped

  trip-service:
    build: ./services/trip-service
    container_name: albiletkuto_trip
    ports:
      - "8001:80"
    depends_on:
      - postgres
    restart: unless-stopped

  booking-service:
    build: ./services/booking-service
    container_name: albiletkuto_booking
    ports:
      - "8002:80"
    depends_on:
      - postgres
      - kafka
    restart: unless-stopped

  payment-service:
    build: ./services/payment-service
    container_name: albiletkuto_payment
    depends_on:
      - kafka
    restart: unless-stopped

  notification-service:
    build: ./services/notification-service
    container_name: albiletkuto_notification
    depends_on:
      - kafka
    restart: unless-stopped

volumes:
  postgres_data: